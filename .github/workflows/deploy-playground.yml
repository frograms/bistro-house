name: Deploy Playground

# playground(@watcha-authentic 데모/문서 사이트) 정적 배포 — 리포 공용 reusable-static-deploy 호출.
# 내부에서 validate(test_command 실행) → deploy(빌드 + S3 sync + CF invalidation + 등록)로 실행된다.
# 서빙: https://services.watcha.com/web-packages/ (app_name = vite base = /web-packages/)
#
# 새 앱 추가 시 이 파일을 복사해 app_name/커맨드/paths 만 바꾸면 된다.

on:
  push:
    branches:
      - master
    paths:
      - "packages/**"
      - "apps/playground/**"
      - ".github/workflows/deploy-playground.yml"
      - ".github/workflows/reusable-static-deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-playground
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy-playground:
    uses: ./.github/workflows/reusable-static-deploy.yml
    with:
      app_name: web-packages
      test_command: pnpm exec turbo run test lint typecheck --filter=playground
      build_command: |
        pnpm build:packages
        pnpm build --filter=playground
      dist_path: apps/playground/dist
      description: "@watcha-authentic 패키지 데모/문서 (playground)"
    secrets: inherit
