# pull_request 에 변경점이 있을때(푸쉬 등) 마다 워크스페이스를 validate 합니다.
#
# on: pull_request — opened, synchronize, reopened
# job validate-pr — setup-action 후 루트 pnpm validate
name: Validate PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  id-token: write

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup-action

      - name: Run validate to workspace
        run: pnpm validate
