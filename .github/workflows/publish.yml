# master·patch/** push 시 preflight에서 잡힌 변경 패키지를 검증한 뒤 npm에 배포한다.
#
# on: push — master (latest), patch/** (patch dist-tag)
# 흐름: preflight → validate → publish-latest | publish-patch
#
# preflight — publish_type (latest | patch | none), changed_packages
# validate  — changed_packages → validate-targets.sh
# publish-* — needs validate, publish_type에 따라 latest(Lerna+Release) 또는 patch
name: Publish Packages

on:
  push:
    branches:
      - master
      - "patch/**"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      publish_type: ${{ steps.preflight.outputs.publish_type }}
      changed_packages: ${{ steps.preflight.outputs.changed_packages }}
    env:
      BRANCH_PUBLISH_TYPE: ${{ github.ref == 'refs/heads/master' && 'latest' || 'patch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup-action
        with:
          enable-turbo-cache: false

      - name: Resolve publish targets
        id: preflight
        run: |
          case "$BRANCH_PUBLISH_TYPE" in
            latest)
              CHANGED_PACKAGES=$(bash ./project-attachment/script/get-changed-targets-by-latest.sh)
              ;;
            patch)
              CHANGED_PACKAGES=$(bash ./project-attachment/script/get-changed-targets-by-commit.sh "${{ github.sha }}")
              ;;
            *)
              echo "❌ 지원하지 않는 BRANCH_PUBLISH_TYPE: $BRANCH_PUBLISH_TYPE" >&2
              exit 1
              ;;
          esac

          if [ -z "$CHANGED_PACKAGES" ]; then
            resolve_publish_type=none
            echo "배포 대상 패키지가 없습니다."
          else
            resolve_publish_type=$BRANCH_PUBLISH_TYPE
            echo "변경 패키지:"
            echo "$CHANGED_PACKAGES"
          fi

          # export publish_type
          echo "publish_type=$resolve_publish_type" >> "$GITHUB_OUTPUT"
          # export changed_packages
          {
            echo "changed_packages<<EOF"
            echo "$CHANGED_PACKAGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  validate:
    needs: preflight
    if: needs.preflight.outputs.publish_type != 'none'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    outputs:
      publish_type: ${{ needs.preflight.outputs.publish_type }}
      changed_packages: ${{ needs.preflight.outputs.changed_packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup-action

      - name: Validate changed packages
        run: |
          printf '%s\n' '${{ needs.preflight.outputs.changed_packages }}' \
            | bash ./project-attachment/script/target/validate-targets.sh

  publish-latest:
    needs: validate
    if: needs.validate.outputs.publish_type == 'latest'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Environment
        uses: ./.github/actions/setup-action

      - name: Configure Git
        run: |
          git config --global user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config --global user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Build packages
        run: |
          printf '%s\n' '${{ needs.validate.outputs.changed_packages }}' \
            | bash ./project-attachment/script/target/build-targets.sh

      - name: Run Lerna-Lite publish (no push)
        run: |
          bash ./project-attachment/script/run-lerna-with-publish-scope.sh \
            publish --yes --conventional-commits --no-push

      - name: Wait for published packages on npm registry
        run: bash ./project-attachment/script/wait-for-published-packages.sh

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Sync lockfile into release commit
        run: |
          mapfile -t RELEASE_TAGS < <(git tag --points-at HEAD)

          # lerna-publish-scope 파일이 있으면 삭제 합니다
          git rm -f lerna-publish-scope.txt 2>/dev/null || true

          # lock 변경사항이 있으면 커밋에 추가 합니다
          git diff --quiet pnpm-lock.yaml || git add pnpm-lock.yaml

          # HEAD 기준으로 변경사항(staged)이 없으면 이하 작업을 건너뜁니다
          if git diff --cached --quiet && git diff --quiet; then
            echo "release commit 수정 없음"
            exit 0
          fi

          # HEAD 를 staged 항목들을 더해 수정 합니다.
          git commit --amend --no-edit
          # amend 로 HEAD 해쉬가 변경 되었으므로 태그를 새로운 HEAD에 이동합니다
          for tag in "${RELEASE_TAGS[@]}"; do
            git tag -fa "$tag" -m "$tag"
          done

      - name: Push commit and tags
        run: |
          git push origin "$GITHUB_REF_NAME"
          git push origin --tags

      - name: Create GitHub releases
        uses: ./.github/actions/create-package-releases-action
        with:
          changed_packages: ${{ needs.validate.outputs.changed_packages }}

  publish-patch:
    needs: validate
    if: needs.validate.outputs.publish_type == 'patch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Environment
        uses: ./.github/actions/setup-action

      - name: Configure Git
        run: |
          git config --global user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config --global user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Run patch publish (with build)
        run: |
          CHANGED_PACKAGES='${{ needs.validate.outputs.changed_packages }}'
          while IFS= read -r PACKAGE_PATH; do
            [ -z "$PACKAGE_PATH" ] && continue
            PACKAGE_SHORT=$(basename "$PACKAGE_PATH")
            echo "📦 patch 배포: $PACKAGE_SHORT"
            OUTPUT=$(bash ./project-attachment/script/publish-patch.sh "$PACKAGE_SHORT" npm-oidc 2>&1 | tee /dev/stderr)
            TAG=$(echo "$OUTPUT" | grep '^publish-prerelease-result-tag=' | tail -1 | cut -d= -f2-)
            if [ -z "$TAG" ]; then
              echo "❌ 태그 결과를 찾지 못했습니다 (publish-prerelease-result-tag 결과를 반환받지 못했습니다)."
              exit 1
            fi
            git tag "$TAG"
            echo "🏷️  git tag: $TAG"
          done <<< "$CHANGED_PACKAGES"

      - name: Push tags
        run: git push origin --tags

      - name: Create GitHub releases
        uses: ./.github/actions/create-package-releases-action
        with:
          changed_packages: ${{ needs.validate.outputs.changed_packages }}
