name: Publish Packages

on:
  push:
    branches:
      - master

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_changes: ${{ steps.preflight.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup-action

      - name: Check changed packages
        id: preflight
        run: |
          CHANGED=$(bash ./project-attachment/changed-targets.sh 2>/dev/null || true)
          if [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "배포 대상 패키지가 없습니다."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: preflight
    if: needs.preflight.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Environment
        uses: ./.github/actions/setup-action

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build packages
        run: pnpm build-targets

      - name: Run Lerna publish (no push)
        run: |
          pnpm lerna publish --yes --conventional-commits --no-push 2>&1 | tee lerna-publish.log

      # 라이브러리간 종속성이 있는경우 lock 재구성
      - name: Re-install to refresh lockfile
        run: pnpm install

      - name: Amend lockfile if changed
        run: |
          if ! git diff --quiet pnpm-lock.yaml; then
            git add pnpm-lock.yaml
            git commit -m "chore: update lockfile"
          fi

      - name: Push commit and tags
        run: |
          git push origin $GITHUB_REF_NAME
          git push origin --tags

      - name: Get published tags from lerna
        id: get-tags
        uses: ./.github/actions/get-published-tags-from-lerna-action
        with:
          lerna_log_file: lerna-publish.log

      - name: Create releases for published tags
        if: steps.get-tags.outputs.tags != '[]'
        run: |
          set -e
          # JSON 배열을 파싱하여 각 태그에 대해 릴리즈 생성
          jq -r '.[]' <<< '${{ steps.get-tags.outputs.tags }}' | while read -r TAG_NAME; do
            echo "Creating release for tag: $TAG_NAME"
            gh release create "$TAG_NAME" \
              --generate-notes \
              --title "$TAG_NAME"
          done
        env:
          GH_TOKEN: ${{ github.token }}
