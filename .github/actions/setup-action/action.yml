name: "Setup Environment"
description: "Setup Node.js, pnpm and install dependencies"

inputs:
  node-version:
    description: "Node.js version"
    required: false
    default: "22"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: "https://registry.npmjs.org"
        scope: "@watcha-authentic"

    # npm oidc(trusted publishing) 관련으로 npm 11.5.1+ 필요 (https://docs.npmjs.com/trusted-publishers)
    # setup-node@v6 에서 버전을 컨트롤 할 수 없으므로 향후 node-version 업그레이드를 검토 한다. 업그레이드 되면 스텝 전체를 제거할 수 있다.
    - name: Upgrade npm for Trusted Publishing
      shell: bash
      run: |
        npm install -g npm@11
        echo "node $(node -v) / npm $(npm -v)"

    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Get pnpm store directory
      id: get-store-path
      shell: bash
      run: echo STORE_PATH=$(pnpm store path) >> $GITHUB_OUTPUT

    - name: Setup pnpm cache
      uses: actions/cache@v5
      id: cache-pnpm-store
      with:
        path: ${{ steps.get-store-path.outputs.STORE_PATH }}
        key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-store-
          pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}

    - name: Setup Turbo cache
      uses: actions/cache@v5
      id: cache-turbo
      with:
        path: .turbo
        key: turbo-${{ runner.os }}-${{ hashFiles('turbo.json', 'pnpm-lock.yaml') }}
        restore-keys: |
          turbo-${{ runner.os }}-
          turbo-

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
