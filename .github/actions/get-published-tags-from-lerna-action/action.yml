name: "Get Published Tags from Lerna"
description: "Get published package tags from lerna publish output"

outputs:
  tags:
    description: "JSON array of published tags"
    value: ${{ steps.get-tags.outputs.tags }}

inputs:
  lerna_log_file:
    description: "Path to lerna publish log file"
    required: true
    default: "lerna-publish.log"

runs:
  using: composite
  steps:
    - name: Get published tags
      id: get-tags
      shell: bash
      run: |
        # lerna publish 로그에서 배포된 패키지 파싱
        if [ -f "${{ inputs.lerna_log_file }}" ]; then
          # "Successfully published:" 섹션에서 패키지 추출
          PUBLISHED=$(grep -A 100 "Successfully published:" "${{ inputs.lerna_log_file }}" | \
            grep -oE "@watcha-authentic/[^@]+@[0-9]+\.[0-9]+\.[0-9]+" | \
            sort -u)
          
          if [ -n "$PUBLISHED" ]; then
            TAGS_JSON=$(echo "$PUBLISHED" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "tags=$TAGS_JSON" >> $GITHUB_OUTPUT
            echo "Found published packages:"
            echo "$PUBLISHED"
          else
            echo "tags=[]" >> $GITHUB_OUTPUT
            echo "No packages found in lerna output"
          fi
        else
          echo "tags=[]" >> $GITHUB_OUTPUT
          echo "Lerna log file not found"
        fi
