name: "Create package GitHub releases"
description: "Resolve current-version tag targets from changed packages and create GitHub releases (notes via gh generate-notes)"

inputs:
  changed_packages:
    description: "줄바꿈으로 구분된 packages 절대경로 (multiline). 예) .../packages/react-motion\\n.../packages/react-slider"
    required: true

runs:
  using: composite
  steps:
    - name: Create GitHub releases
      shell: bash
      run: |
        set -e

        manifest=$(printf '%s\n' '${{ inputs.changed_packages }}' \
          | bash ./project-attachment/script/target/current-version-info-targets.sh)

        echo "Release manifest:"
        echo "$manifest" | jq .

        if [ -z "$manifest" ] || [ "$manifest" = "[]" ]; then
          echo "릴리즈 대상이 없습니다."
          exit 0
        fi

        jq -c '.[]' <<< "$manifest" | while read -r entry; do
          tag=$(echo "$entry" | jq -r '.tag')
          package_path=$(echo "$entry" | jq -r '.package_path')

          if git rev-parse "$tag^{commit}" >/dev/null 2>&1; then
            echo "태그 확인: $tag"
          else
            echo "❌ git 태그 없음: $tag (push 이후에 실행하세요)" >&2
            exit 1
          fi

          echo "generate-notes로 릴리즈 생성: $tag ($package_path)"
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes
        done
